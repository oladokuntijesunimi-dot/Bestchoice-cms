{% extends "base.html" %}
{% block title %}Login - Molete CMS{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-2xl shadow-lg border border-brand-100 overflow-hidden">
        <div class="h-1.5 bg-gradient-to-r from-brand-600 via-gold-500 to-brand-600"></div>
        <div class="p-8">
            <div class="w-12 h-12 rounded-full bg-brand-50 border border-brand-100 flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1F4E38" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <h1 class="text-2xl font-display font-semibold text-brand-900 mb-1">Welcome back</h1>
            <p class="text-brand-700/70 text-sm mb-6">
                Members: log in with your full name. Admin: log in with username <strong>admin</strong>.
            </p>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-brand-800 mb-1">Full Name (or Admin Username)</label>
                    <input type="text" name="identifier" required placeholder="e.g. Ada Obi, or admin"
                           class="w-full border border-brand-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold-400 focus:border-gold-400 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-brand-800 mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full border border-brand-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold-400 focus:border-gold-400 focus:outline-none transition">
                </div>
                <button type="submit"
                        class="w-full bg-brand-700 hover:bg-brand-800 text-white font-medium py-2.5 rounded-lg transition shadow-sm">
                    Log In
                </button>
            </form>
            <p class="text-sm text-brand-700/70 mt-4 text-center">
                <a href="{{ url_for('forgot_password') }}" class="text-brand-800 font-semibold underline decoration-gold-400 decoration-2 underline-offset-2">Forgot your password?</a>
            </p>

            <p class="text-sm text-brand-700/70 mt-6 text-center">
                New member? <a href="{{ url_for('signup') }}" class="text-brand-800 font-semibold underline decoration-gold-400 decoration-2 underline-offset-2">Register here</a>
            </p>
        </div>
    </div>
</div>

<a href="https://bestchoicechatbot-1.onrender.com/" target="_blank" rel="noopener noreferrer"
   class="fixed bottom-6 right-6 flex items-center gap-2 bg-gold-500 hover:bg-gold-600 text-brand-900 pl-4 pr-5 py-3 rounded-full shadow-lg transition font-medium"
   aria-label="Chat with us">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <span class="text-sm font-medium">Chat with us</span>
</a>
{% endblock %}
