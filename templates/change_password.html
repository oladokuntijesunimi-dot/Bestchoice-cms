{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-2xl shadow-lg border border-brand-100 overflow-hidden">
        <div class="h-1.5 bg-gradient-to-r from-brand-600 via-gold-500 to-brand-600"></div>
        <div class="p-8">
            <h1 class="text-2xl font-display font-semibold text-brand-900 mb-6">Change Password</h1>
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-brand-800 mb-1">Current Password</label>
                    <input type="password" name="current_password" required
                           class="w-full border border-brand-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold-400 focus:border-gold-400 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-brand-800 mb-1">New Password</label>
                    <input type="password" name="new_password" required minlength="6"
                           class="w-full border border-brand-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold-400 focus:border-gold-400 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-brand-800 mb-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" required minlength="6"
                           class="w-full border border-brand-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold-400 focus:border-gold-400 focus:outline-none transition">
                </div>
                <button type="submit"
                        class="w-full bg-brand-700 hover:bg-brand-800 text-white font-medium py-2.5 rounded-lg transition shadow-sm">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
